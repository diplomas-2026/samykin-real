services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: samykin_payouts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d samykin_payouts"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./product-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/samykin_payouts
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: "12345678901234567890123456789012"
      APP_SEED_DATA_DIR: seed-data
      APP_USERS_FILE: /tmp/users.txt
      GIGACHAT_TOKEN: ${GIGACHAT_TOKEN:-}
    ports:
      - "8081:8080"
volumes:
  postgres-data:
